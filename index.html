<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ijaz Ul Haq - Web Developer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
    header { background: #333; color: white; padding: 20px; text-align: center; }
    section { padding: 40px; max-width: 900px; margin: auto; background: white; margin-top: 20px; border-radius: 8px; }
    .project { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
    button { background: #333; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #555; }
    footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 20px; }
  </style>
</head>
<body>

  <header>
    <h1>Ijaz Ul Haq</h1>
    <p>Web Developer | Portfolio</p>
  </header>

  <section id="projects">
    <h2>My Projects</h2>
    <div class="project">
      <h3>Business Website</h3>
      <p>Modern multi-page website for local business with contact form</p>
    </div>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <form id="contactForm" action="https://formspree.io/f/xnjkwnze" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 Ijaz Ul Haq. All Rights Reserved.</p>
  </footer>

</body>
</html>
